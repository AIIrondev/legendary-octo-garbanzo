<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchung erfolgreich</title>
    <style>
        :root {
            color-scheme: light;
            --bg-a: #0f4c5c;
            --bg-b: #16697a;
            --ok: #22c55e;
            --text: #0f172a;
            --muted: #475569;
            --card: #ffffff;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Manrope", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.14), transparent 45%), linear-gradient(135deg, var(--bg-a), var(--bg-b));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .success-window {
            width: min(900px, 100%);
            background: var(--card);
            border-radius: 1.25rem;
            box-shadow: 0 28px 70px rgba(2, 6, 23, 0.32);
            padding: clamp(1.5rem, 4vw, 3rem);
            text-align: center;
        }
        .badge {
            width: 84px;
            height: 84px;
            margin: 0 auto 1.25rem auto;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: rgba(34, 197, 94, 0.12);
            color: var(--ok);
            font-size: 2rem;
            font-weight: 800;
        }
        h1 {
            margin: 0 0 0.9rem 0;
            font-size: clamp(1.8rem, 5vw, 3rem);
            color: var(--text);
            line-height: 1.1;
        }
        p {
            margin: 0;
            font-size: 1.1rem;
            color: var(--muted);
        }
        .meta {
            margin-top: 1.4rem;
            padding: 1rem;
            border-radius: 0.9rem;
            background: #f8fafc;
            color: #0f172a;
            font-weight: 600;
        }
        .actions {
            margin-top: 1.8rem;
            display: flex;
            justify-content: center;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .btn {
            border: 0;
            border-radius: 0.8rem;
            padding: .85rem 1.25rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-close {
            background: #0f4c5c;
            color: #fff;
        }
        .btn-link {
            background: #e2e8f0;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <main class="success-window" role="main" aria-live="polite">
        <div class="badge">✓</div>
        <h1>Buchung erfolgreich</h1>
        <p>Sie können das Fenster jetzt schließen.</p>

        {% if client_name or slot_start %}
        <div class="meta">
            {% if client_name %}
            <div>Name: {{ client_name }}</div>
            {% endif %}
            {% if slot_start %}
            <div>Termin: {{ slot_start }}</div>
            {% endif %}
        </div>
        {% endif %}

        <div class="actions">
            <button class="btn btn-close" type="button" onclick="window.close()">Fenster schließen</button>
            <a class="btn btn-link" href="{{ url_for('terminplaner.client', appointment_id=appointment_id, tenant=tenant_id) }}">Zurück zur Buchungsseite</a>
        </div>
    </main>
</body>
</html>
